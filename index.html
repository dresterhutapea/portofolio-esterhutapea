<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio - Ester Hutapea</title>
    <style>
        body {
            font-family: 'Calibri', Tahoma, Geneva, Verdana, sans-serif;
            /* Latar belakang gradasi estetik mirip tema Mineral Linktree Anda */
            background: linear-gradient(135deg, #1e1b4b, #312e81);
            
            color: #333333; /* Mengubah warna teks menjadi gelap agar kontras dengan background */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            /* LAPISAN BARU */
            background-color: #DAE7FF;      /* Warna lapisan (bisa diganti kode warna lain/transparan) */
            padding: 40px 30px;             /* Jarak ruang antara bingkai ke foto/tombol di dalamnya */
            border-radius: 24px;            /* Membuat sudut bingkai melengkung estetik */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08); /* Efek bayangan halus agar lapisan terlihat timbul */
            box-sizing: border-box;         /* Memastikan ukuran bingkai tetap rapi di layar HP */
        }
       
        /* KODING UNTUK FOTO PROFIL BULAT */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%; /* Membuat gambar menjadi bulat sempurna */
            object-fit: cover;
            border: 3px solid #ffffff; /* Memberikan bingkai putih tipis */
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
            margin-bottom: 15px;
        }
        .profile-name {
            font-size: 27px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #212B3F;
        }
        .profile-bio {
            font-size: 14px;
            color: #263D69;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .link-btn {
            background: #ffffff; /* Tombol warna putih bersih */
            color: #212B3F;
            text-decoration: none;
            padding: 16px;
            border-radius: 30px; /* Membuat tombol lonjong melengkung seperti Linktree */
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .link-btn:hover {
            background: #2c251e;
            color: #ffffff;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://github.com/dresterhutapea.png" alt="Ester Hutapea" class="profile-img">

        <div class="profile-name">Ester Hutapea</div>
        <div class="profile-bio">Data Analyst | Entry-level specialist in data cleaning, visualization, and predictive insights.</div>

        <div class="links-container">
            <a href="https://www.linkedin.com/in/ester-hutapea" class="link-btn" target="_blank">LinkedIn Profile</a>
            <a href="https://docs.google.com/presentation/d/1_h3llR5ZhF6-hgwQqSfSmeEQPruL-Spkq5n9rcKssEw/present?usp=drive_link" class="link-btn" target="_blank">Bigquery SQL</a>
            <a href="mailto:esterhutapea@gmail.com" class="link-btn">Contact Me</a>
        </div>
    </div>

</body>
</html>
